name: Build and Test

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    types: [opened, synchronize, labeled]

jobs:
  # OpenAPI spec validation and bundling
  spec-validation:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Bundle spec
        uses: ./.github/actions/bundle-spec

  # Kotlin Spring RestClient build
  kotlin-client:
    name: Kotlin Client (Spring RestClient)
    needs: spec-validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-kotlin-spring-restclient
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download bundled spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Build and test
        run: ./gradlew build

  # Kotlin server stubs build
  kotlin-server:
    name: Kotlin Server (Spring)
    needs: spec-validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-kotlin-springboot4
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download bundled spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Build and test
        run: ./gradlew build

  # Editor model build (no OpenAPI spec dependency)
  editor-model:
    name: Editor Model
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor-model
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools
        with:
          install-npm-deps: 'true'
          npm-working-directory: editor-model

      - name: Build and test
        run: ./gradlew build

      - name: Verify TypeScript type generation
        run: pnpm generate:types
