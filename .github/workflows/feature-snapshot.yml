name: Feature Snapshot

on:
  push:
    branches: ['feature/*']

jobs:
  publish:
    name: Publish Feature Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tools with mise
        uses: jdx/mise-action@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Calculate version
        id: version
        run: |
          API_FULL_VERSION=$(grep -E '^\s*version:' epistola-api.yaml | head -1 | sed -E 's/.*version:\s*["'"'"']?([0-9]+\.[0-9]+\.[0-9]+)["'"'"']?.*/\1/')
          BRANCH_SUFFIX="${GITHUB_REF_NAME#feature/}"
          echo "version=${API_FULL_VERSION}-${BRANCH_SUFFIX}-SNAPSHOT" >> $GITHUB_OUTPUT
          echo "Feature snapshot version: ${API_FULL_VERSION}-${BRANCH_SUFFIX}-SNAPSHOT"

      - name: Bundle spec
        run: npx @redocly/cli bundle epistola-api.yaml -o openapi.yaml

      - name: Publish client to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: client-kotlin-spring-restclient
        run: ./gradlew :client:publishAllPublicationsToGitHubPackagesRepository -Pversion=${{ steps.version.outputs.version }}

      - name: Publish server to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: server-kotlin-springboot4
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -Pversion=${{ steps.version.outputs.version }}
