name: Feature Snapshot

on:
  push:
    branches: ['feature/*']

jobs:
  # Validate spec and calculate version
  prepare:
    name: Validate and Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Calculate version
        id: version
        uses: ./.github/actions/calculate-version
        with:
          mode: feature-snapshot

      - name: Bundle spec
        uses: ./.github/actions/bundle-spec

  # Build and publish all modules
  publish:
    name: Publish ${{ matrix.module }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - module: client-kotlin-spring-restclient
            needs_spec: true
            publish_task: ':client:publishAllPublicationsToGitHubPackagesRepository'
          - module: server-kotlin-springboot4
            needs_spec: true
            publish_task: 'publishAllPublicationsToGitHubPackagesRepository'
          - module: editor-model
            needs_spec: false
            publish_task: 'publishAllPublicationsToGitHubPackagesRepository'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download bundled spec
        if: matrix.needs_spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ matrix.module }}
        run: ./gradlew ${{ matrix.publish_task }} -Pversion=${{ needs.prepare.outputs.version }}
