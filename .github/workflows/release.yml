name: Release to Maven Central

on:
  # Main releases: triggered by creating a GitHub Release (e.g., gh release create v0.2.0)
  release:
    types: [published]
  # Hotfix releases: any push to a release branch auto-releases
  push:
    branches:
      - 'release/**'

jobs:
  # Validate and bundle spec
  validate-and-bundle:
    name: Validate and bundle spec
    runs-on: ubuntu-latest
    outputs:
      api_version: ${{ steps.version.outputs.api_version }}
      release_version: ${{ steps.version.outputs.version }}
      is_release_event: ${{ steps.source.outputs.is_release_event }}
    steps:
      - name: Determine release source
        id: source
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "is_release_event=true" >> $GITHUB_OUTPUT
          else
            echo "is_release_event=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Extract version from release tag
        if: github.event_name == 'release'
        id: tag_version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          API_VERSION=$(echo "$VERSION" | sed -E 's/([0-9]+\.[0-9]+)\.[0-9]+/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "api_version=${API_VERSION}" >> $GITHUB_OUTPUT
          echo "Release version from tag: ${VERSION}"

      - name: Calculate version for release branch
        if: github.event_name == 'push'
        id: branch_version
        uses: ./.github/actions/calculate-version
        with:
          mode: release

      - name: Set version output
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ steps.tag_version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "api_version=${{ steps.tag_version.outputs.api_version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.branch_version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "api_version=${{ steps.branch_version.outputs.api_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate release branch version
        if: github.event_name == 'push'
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == release/* ]]; then
            BRANCH_VERSION="${BRANCH#release/}"
            API_VERSION="${{ steps.version.outputs.api_version }}"
            if [[ "$BRANCH_VERSION" != "$API_VERSION" ]]; then
              echo "::error::Branch version ($BRANCH_VERSION) does not match spec version ($API_VERSION)"
              echo "::error::Release branch 'release/$BRANCH_VERSION' must have spec version '$BRANCH_VERSION.x'"
              exit 1
            fi
            echo "Branch version matches spec version"
          fi

      - name: Bundle spec
        uses: ./.github/actions/bundle-spec
        with:
          version: ${{ steps.version.outputs.version }}

  # Build and test all modules before publishing anything.
  # This prevents half-releases where one module publishes but the other fails.
  build:
    needs: validate-and-bundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - module: client-kotlin-spring-restclient
            needs_spec: true
          - module: server-kotlin-springboot4
            needs_spec: true
          - module: editor-model
            needs_spec: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download bundled spec
        if: matrix.needs_spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Build and test
        working-directory: ${{ matrix.module }}
        run: ./gradlew build -Pversion=${{ needs.validate-and-bundle.outputs.release_version }}

  # Reserve the version by creating a git tag before publishing (release branches only).
  # For GitHub Release events the tag already exists.
  create-tag:
    needs: [validate-and-bundle, build]
    if: needs.validate-and-bundle.outputs.is_release_event == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release tag
        run: |
          git tag v${{ needs.validate-and-bundle.outputs.release_version }}
          git push origin v${{ needs.validate-and-bundle.outputs.release_version }}

  # Only publish after ALL builds succeed and version tag is reserved
  publish:
    needs: [validate-and-bundle, build, create-tag]
    # Always run after build succeeds — create-tag may be skipped for release events
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - module: client-kotlin-spring-restclient
            artifact_id: client-spring3-restclient
            needs_spec: true
          - module: server-kotlin-springboot4
            artifact_id: server-kotlin-springboot4
            needs_spec: true
          - module: editor-model
            artifact_id: editor-model
            needs_spec: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bundled spec
        if: matrix.needs_spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Publish to Maven Central
        working-directory: ${{ matrix.module }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishToMavenCentral -Pversion=${{ needs.validate-and-bundle.outputs.release_version }}

      - name: Install npm dependencies
        if: matrix.module == 'editor-model'
        working-directory: editor-model
        run: pnpm install --frozen-lockfile

      - name: Setup npm registry
        if: matrix.module == 'editor-model'
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: matrix.module == 'editor-model'
        working-directory: editor-model
        run: |
          npm version ${{ needs.validate-and-bundle.outputs.release_version }} --no-git-tag-version
          npm publish --provenance --access public

  # Upload release assets and create GitHub release for release branch pushes
  finalize-release:
    needs: [validate-and-bundle, publish]
    if: |
      always() &&
      needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundled spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Upload spec to existing GitHub Release
        if: needs.validate-and-bundle.outputs.is_release_event == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" openapi.yaml --clobber --repo "${{ github.repository }}"

      - name: Create GitHub Release (release branch)
        if: needs.validate-and-bundle.outputs.is_release_event == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-and-bundle.outputs.release_version }}
          name: v${{ needs.validate-and-bundle.outputs.release_version }}
          files: openapi.yaml
          body: |
            ## v${{ needs.validate-and-bundle.outputs.release_version }}

            ### Maven Coordinates
            ```xml
            <dependency>
                <groupId>app.epistola.contract</groupId>
                <artifactId>client-spring3-restclient</artifactId>
                <version>${{ needs.validate-and-bundle.outputs.release_version }}</version>
            </dependency>

            <dependency>
                <groupId>app.epistola.contract</groupId>
                <artifactId>server-kotlin-springboot4</artifactId>
                <version>${{ needs.validate-and-bundle.outputs.release_version }}</version>
            </dependency>

            <dependency>
                <groupId>app.epistola.contract</groupId>
                <artifactId>editor-model</artifactId>
                <version>${{ needs.validate-and-bundle.outputs.release_version }}</version>
            </dependency>
            ```

            ### Gradle (Kotlin DSL)
            ```kotlin
            implementation("app.epistola.contract:client-spring3-restclient:${{ needs.validate-and-bundle.outputs.release_version }}")
            implementation("app.epistola.contract:server-kotlin-springboot4:${{ needs.validate-and-bundle.outputs.release_version }}")
            implementation("app.epistola.contract:editor-model:${{ needs.validate-and-bundle.outputs.release_version }}")
            ```

            ### npm
            ```bash
            npm install @epistola.app/editor-model@${{ needs.validate-and-bundle.outputs.release_version }}
            ```

            ### OpenAPI Spec
            The bundled OpenAPI specification is attached as `openapi.yaml`.
          draft: false
          prerelease: false
          generate_release_notes: true

  # Publish mock server after successful release
  mock-server:
    name: Publish Mock Server
    needs: [validate-and-bundle, publish]
    if: |
      always() &&
      needs.publish.result == 'success'
    uses: ./.github/workflows/mock-server.yml
    with:
      version: ${{ needs.validate-and-bundle.outputs.release_version }}
    permissions:
      contents: read
      packages: write
