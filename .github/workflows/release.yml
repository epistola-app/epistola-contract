name: Release to Maven Central

on:
  # Auto-release when a commit on main contains [release], or any push to release branches
  push:
    branches:
      - main
      - 'release/**'
  # Manual release
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to release'
        required: true
        type: choice
        options:
          - all
          - client-kotlin-spring-restclient
          - server-kotlin-springboot4
          - editor-model

jobs:
  # Validate and bundle spec
  validate-and-bundle:
    name: Validate and bundle spec
    if: >-
      contains(github.event.head_commit.message, '[release]') ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    outputs:
      api_version: ${{ steps.version.outputs.api_version }}
      release_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup tools
        uses: ./.github/actions/setup-build-tools

      - name: Calculate release version
        id: version
        uses: ./.github/actions/calculate-version
        with:
          mode: release

      - name: Validate release branch version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == release/* ]]; then
            BRANCH_VERSION="${BRANCH#release/}"
            API_VERSION="${{ steps.version.outputs.api_version }}"
            if [[ "$BRANCH_VERSION" != "$API_VERSION" ]]; then
              echo "::error::Branch version ($BRANCH_VERSION) does not match spec version ($API_VERSION)"
              echo "::error::Release branch 'release/$BRANCH_VERSION' must have spec version '$BRANCH_VERSION.x'"
              exit 1
            fi
            echo "Branch version matches spec version"
          fi

      - name: Bundle spec
        uses: ./.github/actions/bundle-spec
        with:
          version: ${{ steps.version.outputs.version }}

  # Build and test all modules before publishing anything.
  # This prevents half-releases where one module publishes but the other fails.
  build:
    needs: validate-and-bundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - module: client-kotlin-spring-restclient
            needs_spec: true
          - module: server-kotlin-springboot4
            needs_spec: true
          - module: editor-model
            needs_spec: false
    steps:
      - name: Check if should run
        id: should_run
        run: |
          # For push events (auto-release), always build all
          # For workflow_dispatch, check the input
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            MODULE_INPUT="${{ inputs.module }}"
            if [ "$MODULE_INPUT" == "all" ] || [ "$MODULE_INPUT" == "${{ matrix.module }}" ]; then
              echo "enabled=true" >> $GITHUB_OUTPUT
            else
              echo "enabled=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout
        if: steps.should_run.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download bundled spec
        if: steps.should_run.outputs.enabled == 'true' && matrix.needs_spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Setup tools
        if: steps.should_run.outputs.enabled == 'true'
        uses: ./.github/actions/setup-build-tools

      - name: Build and test
        if: steps.should_run.outputs.enabled == 'true'
        working-directory: ${{ matrix.module }}
        run: ./gradlew build -Pversion=${{ needs.validate-and-bundle.outputs.release_version }}

  # Reserve the version by creating a git tag before publishing.
  # This ensures that if any publish step fails, the version is "consumed" and
  # the next release attempt gets a fresh version instead of retrying the same
  # one and hitting "already exists" errors on Maven Central.
  create-tag:
    needs: [validate-and-bundle, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release tag
        run: |
          git tag v${{ needs.validate-and-bundle.outputs.release_version }}
          git push origin v${{ needs.validate-and-bundle.outputs.release_version }}

  # Only publish after ALL builds succeed and version tag is reserved
  publish:
    needs: [validate-and-bundle, build, create-tag]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - module: client-kotlin-spring-restclient
            artifact_id: client-spring3-restclient
            needs_spec: true
          - module: server-kotlin-springboot4
            artifact_id: server-kotlin-springboot4
            needs_spec: true
          - module: editor-model
            artifact_id: editor-model
            needs_spec: false
    steps:
      - name: Check if should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            MODULE_INPUT="${{ inputs.module }}"
            if [ "$MODULE_INPUT" == "all" ] || [ "$MODULE_INPUT" == "${{ matrix.module }}" ]; then
              echo "enabled=true" >> $GITHUB_OUTPUT
            else
              echo "enabled=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout
        if: steps.should_run.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bundled spec
        if: steps.should_run.outputs.enabled == 'true' && matrix.needs_spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Setup tools
        if: steps.should_run.outputs.enabled == 'true'
        uses: ./.github/actions/setup-build-tools

      - name: Publish to Maven Central
        if: steps.should_run.outputs.enabled == 'true'
        working-directory: ${{ matrix.module }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishToMavenCentral -Pversion=${{ needs.validate-and-bundle.outputs.release_version }}

      - name: Install npm dependencies
        if: matrix.module == 'editor-model' && steps.should_run.outputs.enabled == 'true'
        working-directory: editor-model
        run: pnpm install --frozen-lockfile

      - name: Setup npm registry
        if: matrix.module == 'editor-model' && steps.should_run.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: matrix.module == 'editor-model' && steps.should_run.outputs.enabled == 'true'
        working-directory: editor-model
        run: |
          npm version ${{ needs.validate-and-bundle.outputs.release_version }} --no-git-tag-version
          npm publish --provenance --access public

  # Create GitHub release on the existing tag after all modules are published
  github-release:
    needs: [validate-and-bundle, create-tag, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundled spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-and-bundle.outputs.release_version }}
          name: v${{ needs.validate-and-bundle.outputs.release_version }}
          files: openapi.yaml
          body: |
            ## v${{ needs.validate-and-bundle.outputs.release_version }}

            ### Maven Coordinates
            ```xml
            <dependency>
                <groupId>app.epistola.contract</groupId>
                <artifactId>client-spring3-restclient</artifactId>
                <version>${{ needs.validate-and-bundle.outputs.release_version }}</version>
            </dependency>

            <dependency>
                <groupId>app.epistola.contract</groupId>
                <artifactId>server-kotlin-springboot4</artifactId>
                <version>${{ needs.validate-and-bundle.outputs.release_version }}</version>
            </dependency>

            <dependency>
                <groupId>app.epistola.contract</groupId>
                <artifactId>editor-model</artifactId>
                <version>${{ needs.validate-and-bundle.outputs.release_version }}</version>
            </dependency>
            ```

            ### Gradle (Kotlin DSL)
            ```kotlin
            implementation("app.epistola.contract:client-spring3-restclient:${{ needs.validate-and-bundle.outputs.release_version }}")
            implementation("app.epistola.contract:server-kotlin-springboot4:${{ needs.validate-and-bundle.outputs.release_version }}")
            implementation("app.epistola.contract:editor-model:${{ needs.validate-and-bundle.outputs.release_version }}")
            ```

            ### npm
            ```bash
            npm install @epistola.app/editor-model@${{ needs.validate-and-bundle.outputs.release_version }}
            ```

            ### OpenAPI Spec
            The bundled OpenAPI specification is attached as `openapi.yaml`.
          draft: false
          prerelease: false
          generate_release_notes: true

  # Publish mock server after successful release
  mock-server:
    name: Publish Mock Server
    needs: [validate-and-bundle, publish]
    uses: ./.github/workflows/mock-server.yml
    with:
      version: ${{ needs.validate-and-bundle.outputs.release_version }}
    permissions:
      contents: read
      packages: write
