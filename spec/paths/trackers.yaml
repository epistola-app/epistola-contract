# Tracker Endpoints

tracker-collection:
  parameters:
    - name: tenantId
      in: path
      required: true
      description: Unique slug identifier of the tenant (e.g., "acme-corp")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
        minLength: 3
        maxLength: 63

  get:
    operationId: listTrackers
    summary: List trackers
    description: List all trackers in the tenant.
    tags:
      - Trackers
    x-required-roles: [reader, editor, generator, manager]
    responses:
      '200':
        description: List of trackers
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/trackers.yaml#/TrackerListResponse'
      '401':
        $ref: '../components/responses/auth-errors.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/auth-errors.yaml#/ForbiddenError'

tracker-resource:
  parameters:
    - name: tenantId
      in: path
      required: true
      description: Unique slug identifier of the tenant (e.g., "acme-corp")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
        minLength: 3
        maxLength: 63
    - name: trackerId
      in: path
      required: true
      description: Unique slug identifier of the tracker (e.g., "invoice-processor")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
        minLength: 3
        maxLength: 63

  put:
    operationId: createOrUpdateTracker
    summary: Create or update a tracker
    description: |
      Create a new tracker or update an existing one. Uses PUT for idempotent
      upsert semantics.

      The tracker is automatically associated with the authenticated consumer.
      The consumer's identity is resolved from the caller's authentication
      credentials (JWT client_id or API key mapping).

      On creation, the tracker starts at the position specified by `startFrom`.
      On update, the cursor position is preserved regardless of `startFrom`.
    tags:
      - Trackers
    x-required-roles: [generator, manager]
    requestBody:
      required: false
      content:
        application/vnd.epistola.v1+json:
          schema:
            $ref: '../components/schemas/trackers.yaml#/CreateOrUpdateTrackerRequest'
    responses:
      '200':
        description: Tracker updated successfully
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/trackers.yaml#/TrackerDto'
      '201':
        description: Tracker created successfully
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/trackers.yaml#/TrackerDto'
      '400':
        description: |
          Invalid request. Possible causes:
          - Invalid tracker ID format
          - Caller cannot be identified as a registered consumer
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ValidationErrorResponse'
      '401':
        $ref: '../components/responses/auth-errors.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/auth-errors.yaml#/ForbiddenError'

  get:
    operationId: getTracker
    summary: Get tracker by ID
    description: Retrieve the current state of a tracker including cursor position, active node, and lease.
    tags:
      - Trackers
    x-required-roles: [reader, editor, generator, manager]
    responses:
      '200':
        description: Tracker details
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/trackers.yaml#/TrackerDto'
      '401':
        $ref: '../components/responses/auth-errors.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/auth-errors.yaml#/ForbiddenError'
      '404':
        description: Tracker not found
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ErrorResponse'

  delete:
    operationId: deleteTracker
    summary: Delete a tracker
    description: Permanently remove a tracker and its cursor state.
    tags:
      - Trackers
    x-required-roles: [manager]
    responses:
      '204':
        description: Tracker deleted successfully
      '401':
        $ref: '../components/responses/auth-errors.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/auth-errors.yaml#/ForbiddenError'
      '404':
        description: Tracker not found
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ErrorResponse'

tracker-poll:
  parameters:
    - name: tenantId
      in: path
      required: true
      description: Unique slug identifier of the tenant (e.g., "acme-corp")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
        minLength: 3
        maxLength: 63
    - name: trackerId
      in: path
      required: true
      description: Unique slug identifier of the tracker (e.g., "invoice-processor")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
        minLength: 3
        maxLength: 63

  post:
    operationId: pollTrackerUpdates
    summary: Poll for events
    description: |
      Fetch the next batch of events from the tracker and optionally acknowledge
      previously processed events. This is the core endpoint for event consumption.

      ## Combined acknowledge + fetch

      Each poll can both acknowledge previous events and fetch new ones in a
      single round-trip. On the first poll, omit `acknowledgeUpTo`. On subsequent
      polls, set it to the highest sequence number you successfully processed.

      ## Lease management

      The `X-EP-Node-Id` header identifies the polling node. The server uses this
      for lease-based node affinity:

      1. **No active node** (first poll or lease expired): lease assigned to this node.
      2. **Same node**: lease renewed.
      3. **Different node, lease active**: returns 409 Conflict.
      4. **Different node, lease expired**: takeover — lease assigned to new node,
         cursor preserved.

      The lease duration is server-configured (recommended: 60 seconds). Poll more
      frequently than the lease duration to avoid unintended takeover.

      ## Backpressure

      Use the `limit` parameter to control batch size. Only request as many events
      as you can process before the next poll. When `hasMore` is true, poll again
      immediately to catch up. When false, wait for your configured poll interval.
    tags:
      - Trackers
    x-required-roles: [generator, manager]
    requestBody:
      required: false
      content:
        application/vnd.epistola.v1+json:
          schema:
            $ref: '../components/schemas/trackers.yaml#/PollTrackerRequest'
    responses:
      '200':
        description: |
          Batch of events since the tracker's cursor position.
          May be empty if no new events are available.
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/trackers.yaml#/PollTrackerResponse'
      '400':
        description: |
          Invalid request. Possible causes:
          - `acknowledgeUpTo` is less than the current cursor position
          - `acknowledgeUpTo` is greater than the highest previously returned sequence number
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ValidationErrorResponse'
      '401':
        $ref: '../components/responses/auth-errors.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/auth-errors.yaml#/ForbiddenError'
      '404':
        description: Tracker not found
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ErrorResponse'
      '409':
        description: |
          Tracker lease is held by a different node. Wait until the lease
          expires or the other node stops polling.
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/trackers.yaml#/TrackerLeaseConflictResponse'
      '410':
        description: |
          Cursor is older than the event retention window. The client must
          reset by creating a new tracker or contacting an administrator.
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ErrorResponse'
