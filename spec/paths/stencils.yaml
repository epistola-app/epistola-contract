        description: List of template usages
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/stencils.yaml#/StencilUsageListResponse'
      '401':
        $ref: '../components/responses/auth-errors.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/auth-errors.yaml#/ForbiddenError'
      '404':
        description: Version, stencil, or tenant not found
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ErrorResponse'

stencil-version-upgrade-preview:
  parameters:
    - name: tenantId
      in: path
      required: true
      description: Unique slug identifier of the tenant (e.g., "acme-corp")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
        minLength: 3
        maxLength: 63
    - name: stencilId
      in: path
      required: true
      description: Slug identifier of the stencil
      schema:
        type: string
        pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
        minLength: 3
        maxLength: 50
    - name: versionId
      in: path
      required: true
      description: Target version number to upgrade to (1-200)
      schema:
        type: integer
        minimum: 1
        maximum: 200

  post:
    operationId: previewStencilUpgrade
    summary: Preview upgrading templates to a stencil version
    description: |
      Generate before/after previews for all templates that use an older version of this
      stencil. The versionId in the path is the target version to upgrade to. Returns a
      preview for each affected template version showing the document before and after
      the stencil content would be replaced.
    tags:
      - Stencils
    x-required-roles: [editor, manager]
    responses:
      '200':
        description: List of upgrade previews
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/schemas/stencils.yaml#/UpgradePreviewListResponse'
      '401':
        $ref: '../components/responses/auth-errors.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/auth-errors.yaml#/ForbiddenError'
      '404':
        description: Version, stencil, or tenant not found
        content:
          application/vnd.epistola.v1+json:
            schema:
              $ref: '../components/responses/errors.yaml#/ErrorResponse'
