TrackerDto:
  type: object
  description: |
    A tracker is a named, server-side cursor that delivers events to a consumer
    with consumer-group semantics. Each tracker tracks one consumer's progress
    through the event log, with lease-based node affinity and automatic takeover.

    In Phase 1, trackers are implicitly scoped to the consumer's own generation
    events (generation.completed, generation.failed).
  required:
    - id
    - tenantId
    - consumerId
    - cursor
    - createdAt
  properties:
    id:
      type: string
      pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
      minLength: 3
      maxLength: 63
      description: Unique slug identifier of this tracker within the tenant
      example: invoice-processor
    tenantId:
      type: string
      description: Tenant this tracker belongs to
      example: acme-corp
    consumerId:
      type: string
      description: |
        The consumer identity associated with this tracker, resolved from
        the authenticated caller at creation time. Events are filtered to
        those created by this consumer.
      example: invoice-service
    description:
      type: ['string', 'null']
      maxLength: 500
      description: Human-readable description of this tracker's purpose
      example: Tracks invoice generation completions for retry handling
    cursor:
      $ref: '#/TrackerCursor'
    activeNode:
      type: ['string', 'null']
      description: |
        The X-EP-Node-Id of the node currently holding the lease on this
        tracker. Null if no node is actively polling.
      example: invoice-service-pod-7f8b9c
    leaseExpiresAt:
      type: ['string', 'null']
      format: date-time
      description: |
        When the current node's lease expires. After this time, any node
        of the same consumer can take over by polling.
      example: "2026-04-21T10:31:00Z"
    createdAt:
      type: string
      format: date-time
      description: When the tracker was created
      example: "2026-04-21T10:00:00Z"
    updatedAt:
      type: ['string', 'null']
      format: date-time
      description: When the tracker was last updated
      example: null
  example:
    id: invoice-processor
    tenantId: acme-corp
    consumerId: invoice-service
    description: Tracks invoice generation completions for retry handling
    cursor:
      sequenceNumber: 508
    activeNode: invoice-service-pod-7f8b9c
    leaseExpiresAt: "2026-04-21T10:31:00Z"
    createdAt: "2026-04-21T10:00:00Z"
    updatedAt: null

TrackerCursor:
  type: object
  description: The tracker's current position in the event log
  required:
    - sequenceNumber
  properties:
    sequenceNumber:
      type: integer
      format: int64
      description: |
        The sequence number up to which this tracker has acknowledged
        processing. Events with sequenceNumber > this value are pending.
      example: 508

CreateOrUpdateTrackerRequest:
  type: object
  description: |
    Request body for creating or updating a tracker. Uses PUT for idempotent
    upsert — the tracker is created if it does not exist, or updated if it does.

    The tracker is automatically scoped to the authenticated consumer's own
    generation events. The consumer identity is resolved from the caller's
    authentication credentials.
  properties:
    startFrom:
      type: string
      enum: [earliest, latest]
      default: earliest
      description: |
        Where to start when the tracker is first created.
        - `earliest`: From the oldest available event in the retention window.
        - `latest`: From the current position (only future events).
        This field is only used on creation. On update, the cursor is preserved.
      example: latest
    description:
      type: ['string', 'null']
      maxLength: 500
      description: Human-readable description of this tracker's purpose
      example: Tracks invoice generation completions for retry handling

TrackerListResponse:
  type: object
  description: |
    List of trackers in a tenant. Not paginated because the number of trackers
    per tenant is expected to be small (tens, not thousands).
  required:
    - items
  properties:
    items:
      type: array
      description: List of trackers
      items:
        $ref: '#/TrackerDto'

PollTrackerRequest:
  type: object
  description: |
    Request body for polling a tracker. Combines acknowledgment of previously
    processed events with fetching the next batch.

    On the first poll, omit `acknowledgeUpTo` (nothing to acknowledge yet).
    On subsequent polls, set `acknowledgeUpTo` to the highest sequence number
    from the previous batch that was successfully processed.
  properties:
    acknowledgeUpTo:
      type: ['integer', 'null']
      format: int64
      description: |
        Acknowledge that all events up to and including this sequence number
        have been successfully processed. The server advances the cursor to
        this value.

        Omit or set to null on the first poll (nothing to acknowledge yet).

        The value must be >= the tracker's current cursor position and
        <= the highest sequence number previously returned to this tracker.
        Out-of-range values return 400.

        Partial acknowledgment is supported: if you received events 100-104
        but only processed through 102, set acknowledgeUpTo to 102. The next
        poll will return events starting from 103.
      example: 508
    limit:
      type: integer
      minimum: 1
      maximum: 1000
      default: 100
      description: |
        Maximum number of events to return in this batch. Use this for
        backpressure — only request as many events as you can process
        before the next poll.
      example: 100

PollTrackerResponse:
  type: object
  description: |
    Response from polling a tracker. Contains a batch of events and cursor
    information for the next poll.
  required:
    - events
    - cursor
  properties:
    events:
      type: array
      items:
        $ref: '../schemas/events.yaml#/EventEnvelope'
      description: |
        Batch of events since the tracker's cursor position, ordered by
        sequenceNumber ascending. Empty array when no new events are available.
    cursor:
      type: object
      required:
        - sequenceNumber
        - hasMore
      properties:
        sequenceNumber:
          type: integer
          format: int64
          description: |
            The highest sequence number in this batch. Pass this value as
            `acknowledgeUpTo` in the next poll after processing all events.
            When the batch is empty, this equals the tracker's current
            cursor position.
          example: 512
        hasMore:
          type: boolean
          description: |
            True if there are more events beyond this batch. The client
            should poll again immediately (without waiting for a poll interval).
            False means the client has caught up and should wait before
            polling again.
          example: false

TrackerLeaseConflictResponse:
  type: object
  description: |
    Returned when a poll is rejected because the tracker's lease is held
    by a different node. The client should wait until the lease expires
    or the other node releases it.
  required:
    - code
    - message
    - activeNode
    - leaseExpiresAt
  properties:
    code:
      type: string
      description: Machine-readable error code
      example: TRACKER_LEASED
    message:
      type: string
      description: Human-readable description of the conflict
      example: "Tracker 'invoice-processor' is leased to node 'pod-abc' until 2026-04-21T10:31:00Z"
    activeNode:
      type: string
      description: X-EP-Node-Id of the node currently holding the lease
      example: invoice-service-pod-7f8b9c
    leaseExpiresAt:
      type: string
      format: date-time
      description: When the current lease expires
      example: "2026-04-21T10:31:00Z"
