ThemeDto:
  type: object
  description: A theme defines reusable styling that can be applied across multiple templates
  required:
    - id
    - tenantId
    - name
    - documentStyles
    - createdAt
    - lastModified
  properties:
    id:
      type: string
      pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
      minLength: 3
      maxLength: 20
      description: Slug identifier of the theme (e.g., "corporate")
      example: corporate
    tenantId:
      type: string
      pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
      minLength: 3
      maxLength: 63
      description: Slug identifier of the tenant this theme belongs to
      example: acme-corp
    name:
      type: string
      description: Name of the theme
      example: Corporate Theme
    description:
      type: string
      description: Optional description of the theme
      example: Default corporate branding with Acme colors and fonts
    documentStyles:
      $ref: '#/DocumentStylesDto'
    pageSettings:
      $ref: '#/PageSettingsDto'
    blockStylePresets:
      type: object
      additionalProperties:
        $ref: './template-model.yaml#/BlockStylePresetDto'
      description: Named block style presets (like CSS classes). Key is the preset name.
      example:
        heading:
          label: Heading
          styles:
            fontSize: "18pt"
            fontWeight: bold
          applicableTo:
            - text
        caption:
          label: Caption
          styles:
            fontSize: "9pt"
            color: "#666666"
    spacingUnit:
      type: number
      minimum: 1
      maximum: 16
      description: |
        Base spacing unit in points for the spacing scale system. All sp values
        are multiples of this value (e.g., with spacingUnit=4, 2sp resolves
        to 8pt). Null means default (4pt).
      example: 4
    createdAt:
      type: string
      format: date-time
      description: Timestamp when the theme was created
      example: "2026-01-17T11:00:00Z"
    lastModified:
      type: string
      format: date-time
      description: Timestamp when the theme was last modified
      example: "2026-01-18T14:30:00Z"
  example:
    id: corporate
    tenantId: acme-corp
    name: Corporate Theme
    description: Default corporate branding with Acme colors and fonts
    documentStyles:
      fontFamily: Helvetica
      fontSize: "12pt"
      fontWeight: normal
      color: "#333333"
      lineHeight: "1.5"
      letterSpacing: "0.5pt"
      textAlign: left
    pageSettings:
      format: A4
      orientation: portrait
      margins:
        top: 20
        right: 20
        bottom: 20
        left: 20
    blockStylePresets:
      heading:
        label: Heading
        styles:
          fontSize: "18pt"
          fontWeight: bold
          marginBottom: "4sp"
        applicableTo:
          - text
      caption:
        label: Caption
        styles:
          fontSize: "9pt"
          color: "#666666"
    spacingUnit: 4
    createdAt: "2026-01-17T11:00:00Z"
    lastModified: "2026-01-18T14:30:00Z"

DocumentStylesDto:
  type: object
  description: |
    Document-level style overrides. Open object — the available style properties are
    driven by the style registry (e.g. fontFamily, fontSize, color, lineHeight, etc.).
    Keys are camelCase CSS property names, values are strings.

    **Supported units:**
    - `pt` — points (1/72 inch). The native PDF unit, used for all sizes.
    - `sp` — spacing scale. Multiplier of the theme's `spacingUnit` (default 4pt).
      Example: `"2sp"` = 2 × 4pt = 8pt.
    - `mm` — millimeters. Used for page margins only.

    Examples: `"12pt"`, `"2sp"`, `"1.5sp"`.
  example:
    fontFamily: Helvetica
    fontSize: "12pt"
    fontWeight: normal
    color: "#333333"
    lineHeight: "1.5"
    letterSpacing: "0.5pt"
    textAlign: left

PageSettingsDto:
  type: object
  description: Page layout settings
  properties:
    format:
      type: string
      enum: [A4, Letter, Custom]
      description: Page format
      example: A4
    orientation:
      type: string
      enum: [portrait, landscape]
      description: Page orientation
      example: portrait
    margins:
      $ref: '#/MarginsDto'
    backgroundColor:
      type: string
      description: Page background color (CSS color value)
      example: "#ffffff"
  example:
    format: A4
    orientation: portrait
    margins:
      top: 40
      right: 40
      bottom: 40
      left: 40

MarginsDto:
  type: object
  description: Page margins in millimeters
  properties:
    top:
      type: integer
      minimum: 0
      description: Top margin in mm
      example: 40
    right:
      type: integer
      minimum: 0
      description: Right margin in mm
      example: 40
    bottom:
      type: integer
      minimum: 0
      description: Bottom margin in mm
      example: 40
    left:
      type: integer
      minimum: 0
      description: Left margin in mm
      example: 40
  example:
    top: 40
    right: 40
    bottom: 40
    left: 40

CreateThemeRequest:
  type: object
  description: Request body for creating a new theme
  required:
    - id
    - name
  properties:
    id:
      type: string
      pattern: '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'
      minLength: 3
      maxLength: 20
      description: Client-provided slug identifier for the theme
      example: corporate
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: Name of the theme
      example: Corporate Theme
    description:
      type: string
      description: Optional description of the theme
      example: Default corporate branding with Acme colors and fonts
    documentStyles:
      $ref: '#/DocumentStylesDto'
    pageSettings:
      $ref: '#/PageSettingsDto'
    blockStylePresets:
      type: object
      additionalProperties:
        $ref: './template-model.yaml#/BlockStylePresetDto'
      description: Named block style presets. Key is the preset name.
      example:
        heading:
          label: Heading
          styles:
            fontSize: "18pt"
            fontWeight: bold
    spacingUnit:
      type: number
      minimum: 1
      maximum: 16
      description: Base spacing unit in points. Null means default (4pt).
      example: 4

UpdateThemeRequest:
  type: object
  description: Request body for updating a theme (partial update)
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: New name for the theme
      example: Corporate Theme v2
    description:
      type:
        - string
        - 'null'
      description: New description for the theme (null to clear)
      example: Updated corporate branding for 2026
    documentStyles:
      $ref: '#/DocumentStylesDto'
    pageSettings:
      $ref: '#/PageSettingsDto'
    blockStylePresets:
      type:
        - object
        - 'null'
      additionalProperties:
        $ref: './template-model.yaml#/BlockStylePresetDto'
      description: Named block style presets (null to clear). Key is the preset name.
    spacingUnit:
      type:
        - number
        - 'null'
      minimum: 1
      maximum: 16
      description: Base spacing unit in points (null to reset to default 4pt).
      example: 4

ThemeListResponse:
  type: object
  description: List of themes
  required:
    - items
  properties:
    items:
      type: array
      description: List of themes
      items:
        $ref: '#/ThemeDto'
  example:
    items:
      - id: corporate
        tenantId: acme-corp
        name: Corporate Theme
        description: Default corporate branding with Acme colors and fonts
        documentStyles:
          fontFamily: Helvetica
          fontSize: "12pt"
          fontWeight: normal
          color: "#333333"
          lineHeight: "1.5"
          letterSpacing: "0.5pt"
          textAlign: left
        pageSettings:
          format: A4
          orientation: portrait
          margins:
            top: 20
            right: 20
            bottom: 20
            left: 20
        blockStylePresets:
          heading:
            label: Heading
            styles:
              fontSize: "18pt"
              fontWeight: bold
              marginBottom: "4sp"
            applicableTo:
              - text
          caption:
            label: Caption
            styles:
              fontSize: "9pt"
              color: "#666666"
        createdAt: "2026-01-17T11:00:00Z"
        lastModified: "2026-01-18T14:30:00Z"
