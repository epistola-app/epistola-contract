openapi: 3.1.0
info:
  title: Epistola API
  description: |
    Document template management API for Epistola Suite.

    ## Versioning
    This API uses header-based versioning via the Accept header.
    Use `application/vnd.epistola.v1+json` for API version 1.

    ## Authentication
    The API supports two authentication methods:
    - **OAuth 2.0 JWT** (recommended): Use Client Credentials flow to obtain an access token
    - **API Key**: Static key in `X-API-Key` header for environments without an IdP

    See the [Authentication Guide](/docs/auth.md) for details.

    ## Authorization
    Access is controlled via roles (`reader`, `editor`, `generator`, `admin`) and
    tenant permissions. JWT claims or API key configuration determine which
    tenants a client can access.
  version: "0.2.0"
  contact:
    name: Epistola Team
  license:
    name: EUPL-1.2
    identifier: EUPL-1.2

servers:
  - url: /api
    description: Base API path

tags:
  - name: Tenants
    description: Multi-tenant management operations
  - name: Templates
    description: Document template operations
  - name: Themes
    description: Reusable style collections for templates
  - name: Environments
    description: Tenant environment configuration (staging, production, etc.)
  - name: Attributes
    description: Attribute definitions for variant selection criteria
  - name: Variants
    description: Template variant operations (language, brand variations)
  - name: Versions
    description: Template version lifecycle (draft, publish, archive)
  - name: Stencils
    description: Reusable template component operations (CRUD, versioning, usage tracking)
  - name: Catalogs
    description: Catalog import and management operations
  - name: Generation
    description: Asynchronous document generation operations

# Global security - either JWT or API Key is valid (OR logic via separate array entries)
security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  # Tenants
  /tenants:
    $ref: './spec/paths/tenants.yaml#/tenants'
  /tenants/{tenantId}:
    $ref: './spec/paths/tenants.yaml#/tenants-id'

  # Themes
  /tenants/{tenantId}/catalogs/{catalogId}/themes:
    $ref: './spec/paths/themes.yaml#/themes'
  /tenants/{tenantId}/catalogs/{catalogId}/themes/{themeId}:
    $ref: './spec/paths/themes.yaml#/themes-id'

  # Environments
  /tenants/{tenantId}/environments:
    $ref: './spec/paths/environments.yaml#/environments'
  /tenants/{tenantId}/environments/{environmentId}:
    $ref: './spec/paths/environments.yaml#/environments-id'

  # Attributes
  /tenants/{tenantId}/catalogs/{catalogId}/attributes:
    $ref: './spec/paths/attributes.yaml#/attributes'
  /tenants/{tenantId}/catalogs/{catalogId}/attributes/{attributeKey}:
    $ref: './spec/paths/attributes.yaml#/attributes-key'

  # Templates
  /tenants/{tenantId}/catalogs/{catalogId}/templates:
    $ref: './spec/paths/templates.yaml#/templates'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}:
    $ref: './spec/paths/templates.yaml#/templates-id'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/validate:
    $ref: './spec/paths/templates.yaml#/template-validate'

  # Variants
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants:
    $ref: './spec/paths/variants.yaml#/variants'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}:
    $ref: './spec/paths/variants.yaml#/variants-id'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/set-default:
    $ref: './spec/paths/variants.yaml#/variant-set-default'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/draft:
    $ref: './spec/paths/variants.yaml#/variant-draft'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/activations:
    $ref: './spec/paths/variants.yaml#/variant-activations'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/activations/{environmentId}:
    $ref: './spec/paths/variants.yaml#/variant-activation-env'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/active:
    $ref: './spec/paths/variants.yaml#/variant-active'

  # Versions
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/versions:
    $ref: './spec/paths/versions.yaml#/versions'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/versions/{versionId}:
    $ref: './spec/paths/versions.yaml#/versions-id'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/versions/{versionId}/publish:
    $ref: './spec/paths/versions.yaml#/version-publish'
  /tenants/{tenantId}/catalogs/{catalogId}/templates/{templateId}/variants/{variantId}/versions/{versionId}/archive:
    $ref: './spec/paths/versions.yaml#/version-archive'

  # Stencils
  /tenants/{tenantId}/catalogs/{catalogId}/stencils:
    $ref: './spec/paths/stencils.yaml#/stencils'
  /tenants/{tenantId}/catalogs/{catalogId}/stencils/{stencilId}:
    $ref: './spec/paths/stencils.yaml#/stencils-id'
  /tenants/{tenantId}/catalogs/{catalogId}/stencils/{stencilId}/versions:
    $ref: './spec/paths/stencils.yaml#/stencil-versions'
  /tenants/{tenantId}/catalogs/{catalogId}/stencils/{stencilId}/versions/{versionId}:
    $ref: './spec/paths/stencils.yaml#/stencil-versions-id'
  /tenants/{tenantId}/catalogs/{catalogId}/stencils/{stencilId}/versions/{versionId}/publish:
    $ref: './spec/paths/stencils.yaml#/stencil-version-publish'
  /tenants/{tenantId}/catalogs/{catalogId}/stencils/{stencilId}/versions/{versionId}/archive:
    $ref: './spec/paths/stencils.yaml#/stencil-version-archive'
  /tenants/{tenantId}/catalogs/{catalogId}/stencils/{stencilId}/versions/{versionId}/usage:
    $ref: './spec/paths/stencils.yaml#/stencil-version-usage'
  /tenants/{tenantId}/catalogs/{catalogId}/stencils/{stencilId}/versions/{versionId}/upgrade-preview:
    $ref: './spec/paths/stencils.yaml#/stencil-version-upgrade-preview'

  # Catalogs
  /tenants/{tenantId}/catalogs:
    $ref: './spec/paths/catalogs.yaml#/catalogs'

  # Catalog Import
  /tenants/{tenantId}/catalogs/import:
    $ref: './spec/paths/import.yaml#/import-catalog'

  # Template Import
  /tenants/{tenantId}/catalogs/{catalogId}/templates/import:
    $ref: './spec/paths/import.yaml#/import-templates'

  # Document Preview & Generation
  /tenants/{tenantId}/documents/preview:
    $ref: './spec/paths/generation.yaml#/preview-document'
  /tenants/{tenantId}/documents/generate:
    $ref: './spec/paths/generation.yaml#/generate-document'
  /tenants/{tenantId}/documents/generate/batch:
    $ref: './spec/paths/generation.yaml#/generate-batch'
  /tenants/{tenantId}/documents/jobs:
    $ref: './spec/paths/generation.yaml#/jobs'
  /tenants/{tenantId}/documents/jobs/{requestId}:
    $ref: './spec/paths/generation.yaml#/job-detail'
  /tenants/{tenantId}/documents:
    $ref: './spec/paths/generation.yaml#/documents'
  /tenants/{tenantId}/documents/{documentId}:
    $ref: './spec/paths/generation.yaml#/document-detail'

