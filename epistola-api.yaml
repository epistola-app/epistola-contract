    UpdateStencilRequest:
      $ref: './spec/components/schemas/stencils.yaml#/UpdateStencilRequest'
    CreateStencilVersionRequest:
      $ref: './spec/components/schemas/stencils.yaml#/CreateStencilVersionRequest'
    UpdateStencilDraftRequest:
      $ref: './spec/components/schemas/stencils.yaml#/UpdateStencilDraftRequest'
    StencilUsageDto:
      $ref: './spec/components/schemas/stencils.yaml#/StencilUsageDto'
    UpgradePreviewDto:
      $ref: './spec/components/schemas/stencils.yaml#/UpgradePreviewDto'
    StencilListResponse:
      $ref: './spec/components/schemas/stencils.yaml#/StencilListResponse'
    StencilVersionListResponse:
      $ref: './spec/components/schemas/stencils.yaml#/StencilVersionListResponse'
    StencilUsageListResponse:
      $ref: './spec/components/schemas/stencils.yaml#/StencilUsageListResponse'
    UpgradePreviewListResponse:
      $ref: './spec/components/schemas/stencils.yaml#/UpgradePreviewListResponse'

