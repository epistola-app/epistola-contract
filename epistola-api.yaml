  parameters:
    UserAgent:
      name: User-Agent
      in: header
      required: true
      description: |
        Required. Identifies the client software stack using RFC 9110 product tokens
        (`product/version`). The first token must be `epistola-contract/{version}`
        indicating the contract version the client was built against. Additional tokens
        can be appended to describe the full software stack.
      schema:
        type: string
      example: epistola-contract/0.3.0 valtimo-epistola-plugin/1.2.0

    NodeId:
      name: X-EP-Node-Id
      in: header
      required: true
      description: |
        Required. Identifies the specific client node for request correlation and
        diagnostics. Use the Kubernetes pod name, container ID, or hostname.
        In local/dev environments, the machine hostname is acceptable.
      schema:
        type: string
      example: epistola-cli-pod-7f8b9c

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Bearer token. Two authentication paths are supported:

        **OAuth (recommended for environments with an IdP):**
        Obtain a token via OAuth 2.0 Client Credentials flow from your
        Identity Provider (Keycloak, Azure AD, or any OIDC-compliant IdP).
        The JWT `client_id` claim identifies the consumer.

        **Self-signed JWT (no IdP required):**
        Register via `POST /consumers/register` with a public key.
        After admin approval, create short-lived JWTs (60s) signed with
        your private key. Required claims: `iss` (consumer ID), `exp`,
        `jti` (unique nonce for replay protection).

        In both cases, the JWT proves identity only. Permissions (allowed
        tenants, roles, expiry) are managed in Epistola's consumer record,
        set by an administrator during approval.

    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        **Deprecated — use JWT Bearer authentication (OAuth or self-signed) instead.**

        Static API key for legacy environments. Keys are issued by administrators
        and stored server-side with associated roles and tenant access permissions.
        API key authentication will be removed in a future API version.
