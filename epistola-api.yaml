openapi: 3.1.0
info:
  title: Epistola API
  description: |
    Document template management API for Epistola Suite.

    ## Versioning
    This API uses header-based versioning via the Accept header.
    Use `application/vnd.epistola.v1+json` for API version 1.

    ## Authentication
    The API uses JWT Bearer tokens for authentication. Two paths are supported:
    - **OAuth 2.0** (recommended): Use Client Credentials flow to obtain a JWT from your IdP
    - **Self-signed JWT**: Register with a public key, then sign short-lived JWTs with your private key

    Both paths use `Authorization: Bearer <jwt>`. Permissions (allowed tenants, roles)
    are managed in Epistola's consumer record, not in JWT claims.

    See the [Authentication Guide](/docs/auth.md) for details.

    ## Client Identity

    All requests must include the following headers for client identification:

    - **`User-Agent`** (required) — identifies the client software stack using standard
      [RFC 9110 §10.1.5](https://www.rfc-editor.org/rfc/rfc9110#name-user-agent) product tokens.
      The first token **must** be `epistola-contract/{version}` indicating the contract
      version the client was built against. Additional product/version pairs can be
      appended to describe the full software stack.
      Example: `epistola-contract/0.3.0 valtimo-epistola-plugin/1.2.0 gzac/5.0.0`
    - **`X-EP-Node-Id`** (required) — identifies the specific client node. Use the
      Kubernetes pod name, container ID, or hostname. In local/dev environments,
      the machine hostname is acceptable.

    The generated Epistola client libraries set both headers automatically — `User-Agent`
    with the contract version, and `X-EP-Node-Id` with the hostname. Consumers wrapping
    the client library can append additional product tokens to `User-Agent` for their
    own software and override the node ID as needed.

    ## Authorization
    Access is controlled via roles (`reader`, `editor`, `generator`, `manager`,
    `tenant_control`) and tenant permissions. These are set by an administrator
    when approving a consumer registration.
  version: "0.3.0"
  contact:
    name: Epistola Team
  license:
    name: EUPL-1.2
    identifier: EUPL-1.2

servers:
  - url: /api
    description: Base API path

tags:
  - name: System
    description: |
      System-level endpoints for health checking and metadata exchange.

      ## Ping / Pong

      The `POST /ping` endpoint enables bidirectional metadata exchange between
      clients and the server. It serves two purposes:

      1. **Health checking** — Any client (including load balancers and monitoring
         probes) can send an unauthenticated ping to verify the server is alive.
         The response contains only `status` and `timestamp`.

      2. **Metadata exchange** — Authenticated clients receive a full response
         including server version, API spec version, and node identity. Clients
         can also send their own metadata (name, version, node ID) in the request
         body for server-side logging and diagnostics.

      ### Recommended ping intervals

      - **On startup**: Always ping once before making business requests.
      - **Periodic**: Every 30–60 seconds for ongoing health monitoring.
      - **After failures**: Ping to check server availability before retrying.
  - name: Tenants
    description: Multi-tenant management operations
  - name: Templates
    description: Document template operations
  - name: Themes
    description: Reusable style collections for templates
  - name: Environments
    description: Tenant environment configuration (staging, production, etc.)
  - name: Attributes
    description: Attribute definitions for variant selection criteria
  - name: Variants
    description: Template variant operations (language, brand variations)
  - name: Versions
    description: Template version lifecycle (draft, publish, archive)
  - name: Stencils
    description: Reusable template component operations (CRUD, versioning, usage tracking)
  - name: Catalogs
    description: Catalog import and management operations
  - name: Consumers
    description: |
      Tenant-scoped consumer application registration and lifecycle management.

      Each tenant independently manages which applications can access their resources.
      The same application can register in multiple tenants with separate approvals.

      ## Onboarding

      Two registration paths are supported:

      - **Self-signed JWT**: Application calls `POST /tenants/{tenantId}/consumers/register`
        with a public key. Created as `pending` until a tenant manager approves.
      - **OAuth**: First authenticated request to a tenant auto-registers the consumer
        as `pending`. A tenant manager must approve before resources are accessible.

      ## Permissions

      Consumers declare what permissions they need at registration time (or via
      OAuth scopes). The tenant manager reviews and grants equal or fewer permissions
      on approval. Permissions are per-resource (`read`, `write`, `publish`) and
      managed in Epistola's consumer record.

      ## Authentication

      Both paths use `Authorization: Bearer <jwt>`. For self-signed JWT consumers,
      the JWT is short-lived (60s) and signed with the consumer's private key.
  - name: Generation
    description: Asynchronous document generation operations

# Global security — either method is accepted.
# bearerAuth (JWT) is the recommended path. apiKeyAuth is deprecated and
# retained only for backwards compatibility — it will be removed in a future version.
security:
  - bearerAuth: []
  - apiKeyAuth: []

