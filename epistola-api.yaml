    TemplateDocumentDto:
      $ref: './spec/components/schemas/template-model.yaml#/TemplateDocumentDto'
    NodeDto:
      $ref: './spec/components/schemas/template-model.yaml#/NodeDto'
    SlotDto:
      $ref: './spec/components/schemas/template-model.yaml#/SlotDto'
    ThemeRefDto:
      $ref: './spec/components/schemas/template-model.yaml#/ThemeRefDto'
    BlockStylePresetDto:
      $ref: './spec/components/schemas/template-model.yaml#/BlockStylePresetDto'

    # Version schemas
    VersionDto:
      $ref: './spec/components/schemas/versions.yaml#/VersionDto'
    VersionSummaryDto:
      $ref: './spec/components/schemas/versions.yaml#/VersionSummaryDto'
    UpdateDraftRequest:
      $ref: './spec/components/schemas/versions.yaml#/UpdateDraftRequest'
    PublishVersionRequest:
      $ref: './spec/components/schemas/versions.yaml#/PublishVersionRequest'
    VersionListResponse:
