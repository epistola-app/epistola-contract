    UpdateTenantRequest:
      $ref: './spec/components/schemas/tenants.yaml#/UpdateTenantRequest'
    TenantListResponse:
      $ref: './spec/components/schemas/tenants.yaml#/TenantListResponse'

    # Theme schemas
    ThemeDto:
      $ref: './spec/components/schemas/themes.yaml#/ThemeDto'
    DocumentStylesDto:
